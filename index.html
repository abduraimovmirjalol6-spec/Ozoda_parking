<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚗 Ozoda's Parking</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#ff6b9d;--purple:#c77dff;--gold:#ffd60a;--green:#06d6a0;--dark:#0d0d1a;}
body{
  background:var(--dark);
  font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  height:100vh;overflow:hidden;
  user-select:none;touch-action:none;
}
#stars{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

#main{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100%;
  padding:6px 8px;gap:5px;
}

/* HUD */
#hud{display:flex;gap:24px;align-items:center;flex-shrink:0;}
.stat{text-align:center;color:#555;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;}
.stat span{display:block;font-size:1.2rem;font-weight:900;color:var(--gold);}

/* Avatar panel */
#ap{
  display:flex;align-items:center;gap:8px;
  background:#16163a;border:1.5px solid #2a2a5a;
  border-radius:14px;padding:6px 12px;
  width:100%;flex-shrink:0;
}
#sp{
  flex:1;background:#1e1e40;border-radius:10px;
  padding:6px 10px;font-size:.74rem;font-weight:700;
  color:#e8e8ff;line-height:1.3;
  border:1px solid #2a2a5a;min-height:34px;
  display:flex;align-items:center;
}

/* Canvas wrapper — takes remaining space */
#cw{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;min-height:0;
}
canvas{border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5);}

/* Message */
#msg{font-size:.76rem;color:var(--gold);text-align:center;font-weight:700;flex-shrink:0;height:16px;}

/* D-pad */
#dpad{
  display:grid;
  grid-template-columns:54px 54px 54px;
  grid-template-rows:54px 54px 54px;
  gap:4px;flex-shrink:0;
}
.db{
  background:#16213e;border:1.5px solid #2a2a5a;border-radius:10px;
  color:var(--gold);font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.db:active,.db.pressed{background:var(--pink);color:white;}
.dc{background:#0d0d1a;border-color:#0d0d1a;}

/* Restart */
#rbtn{
  flex-shrink:0;background:none;
  border:1.5px solid var(--pink);color:var(--pink);
  padding:6px 22px;font-size:.72rem;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;border-radius:8px;
  font-family:'Nunito',sans-serif;font-weight:700;
}
#rbtn:active{background:var(--pink);color:white;}
</style>
</head>
<body>
<div id="stars"></div>
<div id="main">
  <div id="hud">
    <div class="stat">Vaqt <span id="timer">60</span></div>
    <div class="stat">Ball <span id="score">0</span></div>
    <div class="stat">Daraja <span id="level">1</span></div>
  </div>

  <div id="ap">
    <canvas id="ac" width="60" height="68"></canvas>
    <div id="sp">Salom! Men Ozodaman! 🌸</div>
  </div>

  <div id="cw"><canvas id="c"></canvas></div>

  <div id="msg">🌸 Yashil joyga haydang!</div>

  <div id="dpad">
    <div></div>
    <button class="db" id="bu">▲</button>
    <div></div>
    <button class="db" id="bl">◀</button>
    <div class="dc"></div>
    <button class="db" id="br">▶</button>
    <div></div>
    <button class="db" id="bd">▼</button>
    <div></div>
  </div>

  <button id="rbtn">Qaytadan 🔄</button>
</div>

<script>
// Stars
(()=>{const w=document.getElementById('stars');for(let i=0;i<40;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;w.appendChild(s);}})();

// Canvas — fit available space
const cw = document.getElementById('cw');
const gameCanvas = document.getElementById('c');
const ctx = gameCanvas.getContext('2d');

function resizeCanvas(){
  const rect = cw.getBoundingClientRect();
  const SZ = Math.min(rect.width, rect.height, 300);
  gameCanvas.width = gameCanvas.height = SZ;
  return SZ;
}
let SZ = resizeCanvas();
const COLS=8,ROWS=8;
let TW=SZ/COLS,TH=SZ/ROWS;

// Avatar canvas
const avatarC = document.getElementById('ac');
const ax = avatarC.getContext('2d');

// Audio
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,d,t,v){t=t||'sine';v=v||.1;const a=getAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}
function sndMove(){tone(300,.04,'square',.05);}
function sndHit(){tone(120,.2,'sawtooth',.18);}
function sndPark(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.15),i*80));}
function sndFail(){tone(180,.5,'sawtooth',.2);}
function sndTick(){tone(800,.04,'square',.04);}

// Speech
const SP={
  start:["Salom! Men Ozodaman! 🌸","Joyni toping! 🚗","DTMdan keyin haydayman! 😄"],
  move:["Ketdik! 🚗💨","Zo'r! ✨","Bravo! 🌟"],
  hit:["Ups! 😅 Diqqat!","Voy! Bino! 😄","Yana urvolmay! 🙈"],
  park:["PARK QILDIM! 🏆✨","Yashasin! 💃🎊","Usta haydovchi! 🌟"],
  fail:["Vaqt tugadi... 😢","Keyingisida! 💪"],
  think:["Qayerga? 🤔","Joy qani? 👀","Ko'rinyapti! 😊"],
};
function say(t){document.getElementById('sp').textContent=SP[t][Math.floor(Math.random()*SP[t].length)];}

// Draw avatar
let curEm='normal';
function drawAv(em){
  curEm=em;
  const w=60,h=68,cx=30;
  ax.clearRect(0,0,w,h);
  // Hair back
  ax.fillStyle='#3d1a00';ax.beginPath();ax.ellipse(cx,h*.3,w*.42,h*.28,0,0,Math.PI*2);ax.fill();
  // Head
  ax.fillStyle='#f4c5a0';ax.beginPath();ax.ellipse(cx,h*.36,w*.36,h*.3,0,0,Math.PI*2);ax.fill();
  // Hair front
  ax.fillStyle='#4a2200';ax.beginPath();ax.moveTo(cx-w*.38,h*.28);ax.quadraticCurveTo(cx-w*.36,h*.1,cx,h*.08);ax.quadraticCurveTo(cx+w*.36,h*.1,cx+w*.38,h*.28);ax.quadraticCurveTo(cx+w*.3,h*.16,cx,h*.14);ax.quadraticCurveTo(cx-w*.3,h*.16,cx-w*.38,h*.28);ax.fill();
  // Ponytail
  ax.fillStyle='#3d1a00';ax.beginPath();ax.moveTo(cx+w*.28,h*.22);ax.quadraticCurveTo(cx+w*.48,h*.34,cx+w*.44,h*.5);ax.quadraticCurveTo(cx+w*.36,h*.46,cx+w*.26,h*.3);ax.fill();
  // Ribbon
  ax.fillStyle='#ff6b9d';ax.beginPath();ax.ellipse(cx+w*.36,h*.35,w*.07,h*.04,-.4,0,Math.PI*2);ax.fill();ax.beginPath();ax.ellipse(cx+w*.43,h*.33,w*.06,h*.04,.4,0,Math.PI*2);ax.fill();ax.fillStyle='#ff9ec4';ax.beginPath();ax.arc(cx+w*.39,h*.34,w*.03,0,Math.PI*2);ax.fill();
  // Eyes
  ax.fillStyle='white';ax.beginPath();ax.ellipse(cx-w*.13,h*.35,w*.08,h*.09,0,0,Math.PI*2);ax.fill();ax.beginPath();ax.ellipse(cx+w*.13,h*.35,w*.08,h*.09,0,0,Math.PI*2);ax.fill();
  ax.fillStyle='#3d1a00';ax.beginPath();ax.ellipse(cx-w*.12,h*.36,w*.05,h*.07,0,0,Math.PI*2);ax.fill();ax.beginPath();ax.ellipse(cx+w*.14,h*.36,w*.05,h*.07,0,0,Math.PI*2);ax.fill();
  ax.fillStyle='white';ax.beginPath();ax.arc(cx-w*.1,h*.34,w*.018,0,Math.PI*2);ax.fill();ax.beginPath();ax.arc(cx+w*.16,h*.34,w*.018,0,Math.PI*2);ax.fill();
  // Cheeks
  ax.fillStyle='rgba(255,150,150,.35)';ax.beginPath();ax.ellipse(cx-w*.22,h*.43,w*.1,h*.06,0,0,Math.PI*2);ax.fill();ax.beginPath();ax.ellipse(cx+w*.22,h*.43,w*.1,h*.06,0,0,Math.PI*2);ax.fill();
  // Nose
  ax.fillStyle='#e8a882';ax.beginPath();ax.ellipse(cx,h*.44,w*.04,h*.03,0,0,Math.PI*2);ax.fill();
  ax.strokeStyle='#3d1a00';ax.lineWidth=1.5;ax.lineCap='round';
  // Eyebrows
  ax.beginPath();ax.moveTo(cx-w*.2,h*.26);ax.quadraticCurveTo(cx-w*.12,em==='happy'?h*.22:h*.24,cx-w*.05,h*.25);ax.stroke();
  ax.beginPath();ax.moveTo(cx+w*.05,h*.25);ax.quadraticCurveTo(cx+w*.12,em==='happy'?h*.22:h*.24,cx+w*.2,h*.26);ax.stroke();
  // Mouth
  if(em==='happy'){ax.beginPath();ax.moveTo(cx-w*.14,h*.5);ax.quadraticCurveTo(cx,h*.6,cx+w*.14,h*.5);ax.stroke();}
  else if(em==='surprised'){ax.beginPath();ax.arc(cx,h*.51,w*.06,0,Math.PI*2);ax.stroke();}
  else if(em==='sad'){ax.beginPath();ax.moveTo(cx-w*.13,h*.54);ax.quadraticCurveTo(cx,h*.48,cx+w*.13,h*.54);ax.stroke();}
  else{ax.beginPath();ax.moveTo(cx-w*.12,h*.5);ax.quadraticCurveTo(cx,h*.56,cx+w*.12,h*.5);ax.stroke();}
  // Body
  ax.fillStyle='#f4c5a0';ax.fillRect(cx-w*.1,h*.64,w*.2,h*.1);
  ax.fillStyle='#c77dff';ax.beginPath();ax.ellipse(cx,h*.83,w*.36,h*.2,0,0,Math.PI*2);ax.fill();
}
drawAv('normal');

// Game
const EMPTY=0,WALL=1,PARK=2;
let gameMap=[],obstacles=[],player={},parkSpot={};
let score=0,level=1,timeLeft=60,tInt=null,gState='idle',shakeT=0;

function buildLevel(){
  clearInterval(tInt);
  SZ=resizeCanvas();
  TW=SZ/COLS;TH=SZ/ROWS;
  const map=[];for(let r=0;r<ROWS;r++)map.push(new Array(COLS).fill(EMPTY));
  for(let i=0;i<COLS;i++){map[0][i]=map[ROWS-1][i]=WALL;}
  for(let i=0;i<ROWS;i++){map[i][0]=map[i][COLS-1]=WALL;}
  const blds=[
    [[1,1,2,2],[1,5,2,2],[5,2,2,2]],
    [[1,1,3,2],[1,5,2,2],[5,1,2,2],[4,5,2,2]],
    [[1,1,2,3],[1,5,2,2],[4,1,2,2],[4,5,2,3]],
    [[1,1,3,2],[4,1,2,2],[1,5,2,2],[4,5,2,2],[6,3,2,2]],
  ][Math.min(level-1,3)];
  blds.forEach(([r,c,h,w])=>{for(let rr=r;rr<r+h&&rr<ROWS;rr++)for(let cc=c;cc<c+w&&cc<COLS;cc++)map[rr][cc]=WALL;});
  const spots=[];for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++)if(map[r][c]===EMPTY)spots.push({r,c});
  const sp=spots[Math.floor(Math.random()*spots.length)];
  map[sp.r][sp.c]=PARK;parkSpot={r:sp.r,c:sp.c};
  obstacles=[];const ocols=['#3a86ff','#8338ec','#06d6a0','#fb5607','#ffbe0b'];let tries=0,cnt=level+1;
  while(obstacles.length<cnt&&tries<300){
    tries++;const r=1+Math.floor(Math.random()*(ROWS-2)),c=1+Math.floor(Math.random()*(COLS-2));
    if(map[r][c]!==EMPTY)continue;
    if(Math.abs(r-sp.r)+Math.abs(c-sp.c)<2)continue;
    obstacles.push({r,c,color:ocols[obstacles.length%ocols.length]});
  }
  const free=spots.filter(s=>!(s.r===sp.r&&s.c===sp.c)&&!obstacles.find(o=>o.r===s.r&&o.c===s.c)&&Math.abs(s.r-sp.r)+Math.abs(s.c-sp.c)>3);
  const ps=free[Math.floor(Math.random()*free.length)]||{r:1,c:1};
  player={r:ps.r,c:ps.c,dir:0};
  timeLeft=Math.max(35,70-level*5);
  gState='playing';
  document.getElementById('timer').textContent=timeLeft;
  document.getElementById('score').textContent=score;
  document.getElementById('level').textContent=level;
  document.getElementById('msg').textContent='🌸 Yashil P joyiga haydang!';
  say('think');drawAv('normal');
  tInt=setInterval(()=>{
    if(gState!=='playing')return;
    timeLeft--;document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=5)sndTick();
    if(timeLeft<=0){gState='fail';document.getElementById('msg').textContent='⏰ Vaqt tugadi!';say('fail');drawAv('sad');sndFail();}
  },1000);
  return map;
}

function tryMove(dr,dc){
  if(gState!=='playing')return;
  const nr=player.r+dr,nc=player.c+dc;
  if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return;
  if(gameMap[nr][nc]===WALL||obstacles.find(o=>o.r===nr&&o.c===nc)){
    sndHit();shakeT=6;say('hit');drawAv('surprised');
    setTimeout(()=>drawAv('normal'),600);return;
  }
  player.r=nr;player.c=nc;
  if(dc===1)player.dir=0;else if(dc===-1)player.dir=Math.PI;
  else if(dr===-1)player.dir=-Math.PI/2;else player.dir=Math.PI/2;
  sndMove();
  if(Math.random()<.25){say('move');drawAv('happy');setTimeout(()=>drawAv('normal'),500);}
  if(nr===parkSpot.r&&nc===parkSpot.c){
    gState='parked';const bonus=Math.max(10,timeLeft);score+=bonus;level++;
    document.getElementById('score').textContent=score;
    document.getElementById('msg').textContent=`🎉 PARK QILDI! +${bonus} ball`;
    say('park');drawAv('happy');sndPark();
    setTimeout(()=>{ gameMap=buildLevel(); },1800);
  }
}

// Draw helpers
function dk(hex,a){const n=parseInt(hex.slice(1),16);return `rgb(${Math.max(0,Math.min(255,(n>>16)+a))},${Math.max(0,Math.min(255,((n>>8)&0xff)+a))},${Math.max(0,Math.min(255,(n&0xff)+a))})`;}

function drawTile(r,c,type){
  const x=c*TW,y=r*TH;
  if(type===WALL){
    ctx.fillStyle='#1c2333';ctx.fillRect(x,y,TW,TH);
    ctx.strokeStyle='#2d3748';ctx.lineWidth=.8;ctx.strokeRect(x+.5,y+.5,TW-1,TH-1);
    ctx.fillStyle='rgba(100,160,255,.1)';
    ctx.fillRect(x+3,y+3,TW*.28,TH*.22);ctx.fillRect(x+TW*.55,y+3,TW*.28,TH*.22);
    ctx.fillRect(x+3,y+TH*.58,TW*.28,TH*.22);ctx.fillRect(x+TW*.55,y+TH*.58,TW*.28,TH*.22);
  } else if(type===PARK){
    ctx.fillStyle='#0a2218';ctx.fillRect(x,y,TW,TH);
    ctx.shadowColor='#2ecc71';ctx.shadowBlur=6;
    ctx.strokeStyle='#2ecc71';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.strokeRect(x+2,y+2,TW-4,TH-4);ctx.setLineDash([]);
    ctx.shadowBlur=0;
    ctx.fillStyle='#2ecc71';ctx.font=`bold ${TW*.42}px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('P',x+TW/2,y+TH/2);
  } else {
    ctx.fillStyle='#16213e';ctx.fillRect(x,y,TW,TH);
    ctx.strokeStyle='#1a2540';ctx.lineWidth=.3;ctx.strokeRect(x,y,TW,TH);
  }
}

function drawObsCar(r,c,color){
  const cx=c*TW+TW/2,cy=r*TH+TH/2,w=TW*.7,h=TH*.5;
  ctx.save();ctx.translate(cx,cy);
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(1,3,w/2,h/2.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,3);ctx.fill();
  ctx.fillStyle=dk(color,-25);ctx.beginPath();ctx.roundRect(-w*.28,-h*.45,w*.56,h*.48,2);ctx.fill();
  ctx.fillStyle='rgba(150,220,255,.5)';ctx.beginPath();ctx.roundRect(-w*.2,-h*.42,w*.4,h*.3,2);ctx.fill();
  ctx.fillStyle='#ffffaa';ctx.fillRect(w/2-3,-h*.2,3,4);ctx.fillRect(w/2-3,h*.16,3,4);
  ctx.fillStyle='#ff4444';ctx.fillRect(-w/2,-h*.2,3,4);ctx.fillRect(-w/2,h*.16,3,4);
  ctx.restore();
}

function drawOzodaCar(r,c,dir){
  const cx=c*TW+TW/2,cy=r*TH+TH/2,w=TW*.78,h=TH*.56;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(dir);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(2,3,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  // Body
  const bg=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);bg.addColorStop(0,'#ff6b9d');bg.addColorStop(1,'#c77dff');
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(-w*.38,-h*.42,w*.32,h*.38,2);ctx.fill();
  // Roof
  ctx.fillStyle='#d04cb0';ctx.beginPath();ctx.roundRect(-w*.3,-h*.86,w*.6,h*.5,3);ctx.fill();
  // Windshield
  ctx.fillStyle='rgba(180,235,255,.78)';ctx.beginPath();ctx.roundRect(-w*.24,-h*.8,w*.48,h*.38,2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=.8;ctx.beginPath();ctx.roundRect(-w*.24,-h*.8,w*.48,h*.38,2);ctx.stroke();

  // Ozoda face inside windshield
  ctx.save();
  const fw=w*.44,fh=h*.3,fy=-h*.61;
  ctx.translate(0,fy);
  // face
  ctx.fillStyle='#f4c5a0';ctx.beginPath();ctx.ellipse(0,0,fw*.26,fh*.5,0,0,Math.PI*2);ctx.fill();
  // hair
  ctx.fillStyle='#3d1a00';ctx.beginPath();ctx.ellipse(0,-fh*.25,fw*.29,fh*.3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4a2200';ctx.beginPath();ctx.moveTo(-fw*.28,fh*.02);ctx.quadraticCurveTo(-fw*.26,-fh*.28,0,-fh*.3);ctx.quadraticCurveTo(fw*.26,-fh*.28,fw*.28,fh*.02);ctx.quadraticCurveTo(fw*.2,-fh*.16,0,-fh*.18);ctx.quadraticCurveTo(-fw*.2,-fh*.16,-fw*.28,fh*.02);ctx.fill();
  // ponytail
  ctx.fillStyle='#3d1a00';ctx.beginPath();ctx.moveTo(fw*.22,-fh*.02);ctx.quadraticCurveTo(fw*.38,fh*.18,fw*.35,fh*.36);ctx.quadraticCurveTo(fw*.28,fh*.32,fw*.2,fh*.08);ctx.fill();
  // ribbon
  ctx.fillStyle='#ff6b9d';ctx.beginPath();ctx.ellipse(fw*.31,fh*.06,fw*.055,fh*.038,-.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff9ec4';ctx.beginPath();ctx.arc(fw*.33,fh*.07,fw*.022,0,Math.PI*2);ctx.fill();
  // eyes
  ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(-fw*.09,fh*.04,fw*.06,fh*.09,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(fw*.09,fh*.04,fw*.06,fh*.09,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3d1a00';ctx.beginPath();ctx.ellipse(-fw*.085,fh*.05,fw*.038,fh*.065,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(fw*.095,fh*.05,fw*.038,fh*.065,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(-fw*.07,fh*.035,fw*.013,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(fw*.108,fh*.035,fw*.013,0,Math.PI*2);ctx.fill();
  // cheeks
  ctx.fillStyle='rgba(255,150,150,.32)';ctx.beginPath();ctx.ellipse(-fw*.15,fh*.16,fw*.065,fh*.05,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(fw*.15,fh*.16,fw*.065,fh*.05,0,0,Math.PI*2);ctx.fill();
  // mouth — reflects emotion
  ctx.strokeStyle='#c0624a';ctx.lineWidth=1.1;ctx.lineCap='round';
  if(curEm==='happy'){ctx.beginPath();ctx.moveTo(-fw*.09,fh*.22);ctx.quadraticCurveTo(0,fh*.3,fw*.09,fh*.22);ctx.stroke();}
  else if(curEm==='surprised'){ctx.beginPath();ctx.arc(0,fh*.22,fw*.055,0,Math.PI*2);ctx.stroke();}
  else if(curEm==='sad'){ctx.beginPath();ctx.moveTo(-fw*.09,fh*.27);ctx.quadraticCurveTo(0,fh*.21,fw*.09,fh*.27);ctx.stroke();}
  else{ctx.beginPath();ctx.moveTo(-fw*.09,fh*.21);ctx.quadraticCurveTo(0,fh*.28,fw*.09,fh*.21);ctx.stroke();}
  ctx.restore();

  // Lights
  ctx.fillStyle='rgba(255,255,200,.9)';ctx.shadowColor='#ffffaa';ctx.shadowBlur=5;ctx.fillRect(w/2-4,-h*.2,4,5);ctx.fillRect(w/2-4,h*.15,4,5);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,50,50,.85)';ctx.shadowColor='#ff4444';ctx.shadowBlur=4;ctx.fillRect(-w/2,-h*.2,4,5);ctx.fillRect(-w/2,h*.15,4,5);ctx.shadowBlur=0;
  // Stars on car
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.font=`${TW*.14}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('★',-w*.3,h*.14);ctx.fillText('✦',w*.3,-h*.04);
  ctx.restore();
}

let sx=0,sy=0;
function draw(){
  if(shakeT>0){sx=(Math.random()-.5)*shakeT;sy=(Math.random()-.5)*shakeT*.5;shakeT=Math.max(0,shakeT-1.5);}else{sx=0;sy=0;}
  ctx.save();ctx.translate(sx,sy);
  ctx.clearRect(-10,-10,SZ+20,SZ+20);
  ctx.fillStyle='#16213e';ctx.fillRect(0,0,SZ,SZ);
  ctx.strokeStyle='#1a2540';ctx.lineWidth=.4;ctx.setLineDash([5,5]);
  for(let r=1;r<ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*TH);ctx.lineTo(SZ,r*TH);ctx.stroke();}
  for(let c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*TW,0);ctx.lineTo(c*TW,SZ);ctx.stroke();}
  ctx.setLineDash([]);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(gameMap[r]&&gameMap[r][c]!==EMPTY)drawTile(r,c,gameMap[r][c]);
  obstacles.forEach(o=>drawObsCar(o.r,o.c,o.color));
  drawOzodaCar(player.r,player.c,player.dir);
  if(gState==='fail'){
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,SZ,SZ);
    ctx.fillStyle='#ff6b9d';ctx.font=`bold ${SZ*.058}px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('VAQT TUGADI! 😢',SZ/2,SZ/2-14);
    ctx.fillStyle='#ffd60a';ctx.font=`${SZ*.038}px Nunito`;ctx.fillText(`Ball: ${score}`,SZ/2,SZ/2+16);
  }
  ctx.restore();
  requestAnimationFrame(draw);
}

// Input
document.addEventListener('keydown',e=>{
  if(gState==='fail'){score=0;level=1;gameMap=buildLevel();return;}
  if(e.key==='ArrowUp'||e.key==='w'){e.preventDefault();tryMove(-1,0);}
  if(e.key==='ArrowDown'||e.key==='s'){e.preventDefault();tryMove(1,0);}
  if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();tryMove(0,-1);}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();tryMove(0,1);}
});

function setupBtn(id,dr,dc){
  const btn=document.getElementById(id);let iv=null;
  const go=()=>{btn.classList.add('pressed');tryMove(dr,dc);iv=setInterval(()=>tryMove(dr,dc),160);};
  const stop=()=>{btn.classList.remove('pressed');clearInterval(iv);};
  btn.addEventListener('touchstart',e=>{e.preventDefault();go();},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();stop();});
  btn.addEventListener('mousedown',go);btn.addEventListener('mouseup',stop);btn.addEventListener('mouseleave',stop);
}
setupBtn('bu',-1,0);setupBtn('bd',1,0);setupBtn('bl',0,-1);setupBtn('br',0,1);
document.getElementById('rbtn').addEventListener('click',()=>{score=0;level=1;gameMap=buildLevel();});

// Start
gameMap=buildLevel();say('start');draw();
</script>
